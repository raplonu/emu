name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [Release, Debug]
        gcc_version: [11, 12]

    env:
      BUILD_TYPE: ${{ matrix.build_type }}
      CONAN_BUILD_TYPE: conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          gcc_version: ${{ matrix.gcc_version }}
          python-version: "3.12"
          conan_cache: 'true'

      - name: Install Conan dependencies
        run: |
          conan install . \
            --options="python=True" \
            --lockfile=conan.lock \
            --lockfile-partial \
            --lockfile-out=conan.lock \
            --build=missing \
            --profile ${{ steps.setup-env.outputs.conan-profile-name }} \
            -s build_type=${BUILD_TYPE}

      - name: Configure CMake
        run: cmake --preset ${CONAN_BUILD_TYPE}

      - name: Build project
        run: cmake --build --preset ${CONAN_BUILD_TYPE}

      - name: Run tests with CTest
        run: ctest --preset ${CONAN_BUILD_TYPE} --output-on-failure

  coverage:
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: Debug
      CONAN_BUILD_TYPE: conan-debug
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          gcc_version: 12
          python-version: "3.12"
          conan_cache: 'true'

      - name: Install Conan dependencies
        run: |
          conan install . \
            --options="python=True" \
            --lockfile=conan.lock \
            --lockfile-partial \
            --lockfile-out=conan.lock \
            --build=missing \
            --profile ${{ steps.setup-env.outputs.conan-profile-name }} \
            -s build_type=${BUILD_TYPE}

      - name: Configure CMake
        run: cmake --preset ${CONAN_BUILD_TYPE} -Denable_coverage=ON

      - name: Build project
        run: cmake --build --preset ${CONAN_BUILD_TYPE}

      - name: Run tests with CTest
        run: ctest --preset ${CONAN_BUILD_TYPE} --output-on-failure


      - name: Generate coverage report (Cobertura XML)
        run: |
          gcovr --gcov-executable gcov-12 -r . --object-directory build/Debug --cobertura-pretty -o build/coverage.xml

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: build/coverage.xml
          format: cobertura

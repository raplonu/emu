name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [Release, Debug]

    env:
      BUILD_TYPE: ${{ matrix.build_type }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conan
        uses: conan-io/setup-conan@v1
        with:
          cache_packages: true

      - name: Install tools (CMake + gcovr if Debug)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cmake<4"
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            sudo apt-get update
            sudo apt-get install -y gcovr
          fi

      - name: Clone and add cosmic-center-index as Conan local remote
        run: |
          git clone https://github.com/raplonu/cosmic-center-index ~/.conan2/cosmic-center-index
          conan remote add cosmic -t=local-recipes-index ~/.conan2/cosmic-center-index --force

      - name: Cache Conan packages
        uses: actions/cache@v3
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ matrix.build_type }}-${{ hashFiles('**/conanfile.*') }}
          restore-keys: |
            ${{ runner.os }}-conan-${{ matrix.build_type }}-

      - name: Install Conan dependencies
        run: |
          conan profile detect --force
          conan install . \
            --lockfile=conan.lock \
            --lockfile-partial \
            --lockfile-out=conan.lock \
            --build=missing \
            -s build_type=${{ matrix.build_type }}

      - name: Configure CMake
        run: cmake --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Build project
        run: cmake --build --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Run tests with CTest
        run: ctest --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --output-on-failure

      - name: Generate coverage report (Debug only)
        if: matrix.build_type == 'Debug'
        run: |
          gcovr -r . --exclude-directories build/ --xml > coverage.xml
          gcovr -r . --exclude-directories build/ --txt

name: Build and Test with Conan

on:
  workflow_run:
    workflows: ["Setup dependencies using conan"]
    types: [completed]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: conanio/gcc11-ubuntu16.04  # Use the updated Docker image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Conan Cache Path
        id: conan_cache
        run: echo "CONAN_CACHE_PATH=$(conan config home)" >> $GITHUB_ENV

      - name: Restore Conan Cache
        uses: actions/cache@v3
        with:
          path: ${{ env.CONAN_CACHE_PATH }}
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.*') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Install Dependencies
        run: conan install . -s build_type=Release

      - name: Configure CMake
        run: cmake . --preset=conan-release

      - name: Build
        run: cmake --build --preset=conan-release

      - name: Run Tests
        run: ctest --preset=conan-release
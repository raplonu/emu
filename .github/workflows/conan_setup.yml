name: Setup dependencies using conan

on: [push, pull_request, workflow_dispatch]

jobs:
  setup_dependencies:
    runs-on: ubuntu-latest
    container:
      image: conanio/gcc11-ubuntu16.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Conan Cache Path
        id: conan_cache
        run: echo "CONAN_CACHE_PATH=$(conan config home)" >> $GITHUB_ENV

      - name: Restore Conan Cache
        uses: actions/cache@v3
        with:
          path: ${{ env.CONAN_CACHE_PATH }}
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.*') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Install Dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Save Conan Cache
        uses: actions/cache@v3
        with:
          path: ${{ env.CONAN_CACHE_PATH }}
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.*') }}
          restore-keys: conan-${{ runner.os }}-
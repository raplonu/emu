image: raplonu/domo:1.0

stages:
    - build
    - test
    - static-analysis
    - package
    - documentation

variables:
  GIT_SUBMODULE_STRATEGY: recursive

# Build jobs
build_release:
    stage: build
    script:
        - conan install . --build=missing -s build_type=Release
        - cmake --preset conan-release
        - cmake --build --preset conan-release
    artifacts:
        paths:
            - build/
        expire_in: 1 hour
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
        - if: $CI_COMMIT_BRANCH =~ /^hotfix\/.*/
        - if: $CI_COMMIT_BRANCH =~ /^rc.*/
        - if: $CI_COMMIT_TAG =~ /^v.*/
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build_debug:
    stage: build
    script:
        - conan install . --build=missing -s build_type=Debug
        - cmake --preset conan-debug
        - cmake --build --preset conan-debug
    artifacts:
        paths:
            - build/
        expire_in: 1 hour
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Test jobs
test_release:
    stage: test
    dependencies:
        - build_release
    script:
        - ctest --preset conan-release --output-on-failure
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
        - if: $CI_COMMIT_BRANCH =~ /^hotfix\/.*/
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test_debug:
    stage: test
    dependencies:
        - build_debug
    script:
        - ctest --preset conan-debug --output-on-failure
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Coverage
coverage:
    stage: test
    dependencies:
        - build_debug
    script:
        - cmake --preset conan-debug -Denable_coverage=ON
        - cmake --build --preset conan-debug
        - ctest --preset conan-debug --output-on-failure
        - gcovr -r . --object-directory build/Debug --cobertura-pretty -o build/coverage.xml
        - gcovr -r . --object-directory build/Debug --html --html-details -o build/coverage/index.html
    coverage: '/lines......: \d+\.\d+\%/'
    artifacts:
        reports:
            coverage_report:
                coverage_format: cobertura
                path: build/coverage.xml
        paths:
            - build/coverage/
        expire_in: 1 week
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Static analysis
static_analysis:
    stage: static-analysis
    dependencies:
        - build_debug
    script:
        - apt-get update && apt-get install -y clang-tidy
        - find src include -name "*.cpp" -o -name "*.hpp" | xargs clang-tidy -p=build/Debug --config-file=.clang-tidy || exit 0
    allow_failure: true
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Package validation
package_validation:
    stage: package
    script:
        - conan create . --build=missing -s build_type=Release
        - cd test_package && conan test . emu/1.0.0@ -s build_type=Release
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
        - if: $CI_COMMIT_TAG =~ /^v.*/

# Documentation
documentation:
    stage: documentation
    script:
        - apt-get update && apt-get install -y doxygen graphviz python3-pip
        - pip3 install sphinx sphinx-rtd-theme breathe sphinx-rtd-dark-mode
        - cd docs && make html
    artifacts:
        paths:
            - build/docs/sphinx/
        expire_in: 1 week
    rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_BRANCH == "develop"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
